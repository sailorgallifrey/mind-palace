apiVersion: v1
kind: Pod
metadata:
  labels:
    doNotDelete: "johnny-and-steve-were-here"
  name: placeholder-i-keep-the-metal-instance-running
  namespace: default
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: karpenter.sh/nodepool
                operator: In
                values:
                  - metal
  containers:
    - name: busybox
      image: busybox:1.30.1
      resources:
        requests:
          memory: "100Mi"
          cpu: "200m"
      command:
        - "sh"
        - "-c"
        - "while true; do sleep 6000; done"
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  tolerations:
    - effect: NoSchedule
      key: bare-metal
      operator: Exists
    - key: kubernetes.io/arch
      operator: Equal
      value: "arm"
